[mcp_servers.practice01]
command = "npx"
args = [
  "-y",
  "ssh-mcp",
  "--",
  "--host=<SSH_HOST_1>",
  "--port=22",
  "--user=<SSH_USER>",
  "--password=<SSH_PASSWORD>",
  "--disableSudo",
  "--timeout=120000",
  "--maxChars=none",
]
startup_timeout_sec = 20
tool_timeout_sec = 120

